name: Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint:check

      - name: Build
        run: yarn build:subpath

      - name: Write build metadata
        run: |
          BUILD_INFO_DIR="$(dirname "$(find dist -name index.html -print -quit)")"
          {
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "ref_name=${GITHUB_REF_NAME}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
          } > "${BUILD_INFO_DIR}/build-info.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-node${{ matrix.node-version }}
          path: dist/
          retention-days: 7

  notify:
    name: Telegram CI Notification
    env:
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
    if: ${{ always() }}
    needs: build
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Telegram 通知
        if: ${{ env.TELEGRAM_TO != '' && env.TELEGRAM_TOKEN != '' }}
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ env.TELEGRAM_TO }}
          token: ${{ env.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *sub-web CI 构建报告*

            *工作流*: `${{ github.workflow }}`
            *状态*: `${{ needs.build.result == 'failure' && '❌ 构建失败' || needs.build.result == 'cancelled' && '⚪ 构建取消' || needs.build.result == 'success' && '✅ 构建成功' || '⚠️ 构建未完成' }}`
            *构建任务*: `${{ needs.build.result }}`
            *触发事件*: `${{ github.event_name }}`
            *提交*: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            *分支*: `${{ github.ref_name }}`
            *工作流运行*: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            *触发人*: `${{ github.actor }}`
      - name: 记录 Telegram 通知跳过原因
        if: ${{ env.TELEGRAM_TO == '' || env.TELEGRAM_TOKEN == '' }}
        run: |
          {
            echo "### Telegram 通知已跳过"
            echo
            echo "未配置 TELEGRAM_TO 或 TELEGRAM_TOKEN。"
          } >> "$GITHUB_STEP_SUMMARY"
