name: Build
run-name: Build ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Resolve artifact metadata
        id: artifact
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "ref-name=${SAFE_REF}" >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint:check

      - name: Build
        run: yarn build

      - name: Write build metadata
        run: |
          {
            echo "event=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "ref_name=${GITHUB_REF_NAME}"
            echo "sha=$(git rev-parse HEAD)"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
          } > dist/build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ steps.artifact.outputs.ref-name }}-${{ steps.artifact.outputs.short-sha }}-node${{ matrix.node-version }}
          path: dist/
          retention-days: 7

      # ==================== TG 通知 ====================
      - name: Telegram 通知
        if: always() # 确保无论成功还是失败都会发送通知
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *GitHub Actions CI 构建报告*

            *工作流*: `${{ github.workflow }}`
            *状态*: ${{ job.status == 'success' && '✅ 构建成功' || '❌ 构建失败' }}
            *触发事件*: `${{ github.event_name }}`
            *提交*: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            *分支*: `${{ github.ref_name }}`
            *触发人*: ${{ github.actor }}
