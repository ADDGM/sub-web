name: Release Docker Image and GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.3 or v0.1.3-rc.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

jobs:
  build-and-push:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      commit-sha: ${{ steps.source.outputs.commit-sha }}
      ghcr-image: ${{ steps.docker-meta.outputs.ghcr-image }}

    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "发布标签必须使用 vX.Y.Z 或 vX.Y.Z-rc.N，例如：v0.1.3 或 v0.1.3-rc.1"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Resolve checked out commit
        id: source
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          echo "commit-sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker image setting
        run: |
          test -n "$DOCKER_IMAGE" || {
            echo "请设置仓库变量 DOCKER_IMAGE，例如：yourname/subweb"
            exit 1
          }

      - name: Generate Docker image metadata
        id: docker-meta
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "ghcr-image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"

          if [[ "${{ steps.release.outputs.prerelease }}" != "true" ]]; then
            {
              echo "tags<<EOF"
              echo "${DOCKER_IMAGE}:${TAG}"
              echo "${DOCKER_IMAGE}:latest"
              echo "${GHCR_IMAGE}:${TAG}"
              echo "${GHCR_IMAGE}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${DOCKER_IMAGE}:${TAG}"
              echo "${GHCR_IMAGE}:${TAG}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        timeout-minutes: 20
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build release assets
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          yarn build:subpath
          mkdir -p release-assets
          tar -czf "release-assets/sub-web-${TAG}-dist.tar.gz" -C dist .
          sha256sum "release-assets/sub-web-${TAG}-dist.tar.gz" > release-assets/checksums.txt

      - name: Generate release notes
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          GHCR_IMAGE="${{ steps.docker-meta.outputs.ghcr-image }}"

          {
            echo "## 版本标签"
            echo "- \`${TAG}\`"
            echo
            echo "## 发布信息"
            echo
            echo "- 发布时间: \`$(date -u '+%Y-%m-%d %H:%M:%S UTC')\`"
            echo "- 触发方式: \`${GITHUB_EVENT_NAME}\`"
            echo "- 工作流运行: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- 提交: [${{ steps.source.outputs.commit-sha }}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${{ steps.source.outputs.commit-sha }})"
            echo
            echo "## Docker 镜像"
            echo
            echo "- Docker Hub: \`${DOCKER_IMAGE}:${TAG}\`"
            echo "- GHCR: \`${GHCR_IMAGE}:${TAG}\`"
            if [[ "${{ steps.release.outputs.prerelease }}" != "true" ]]; then
              echo "- Docker Hub latest: \`${DOCKER_IMAGE}:latest\`"
              echo "- GHCR latest: \`${GHCR_IMAGE}:latest\`"
            fi
            echo
            echo "## 构建产物"
            echo
            echo "- \`sub-web-${TAG}-dist.tar.gz\`: Vite 构建后的静态资源"
            echo "- \`checksums.txt\`: 构建产物 SHA256 校验值"
            echo
            if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
              echo "此版本为候选版本，不会更新 Docker \`latest\` 标签。"
            else
              echo "此版本为正式版本，已更新 Docker \`latest\` 标签。"
            fi
          } > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          RELEASE_ARGS=(--verify-tag --target "${{ steps.source.outputs.commit-sha }}" --title "sub-web ${TAG}" --notes-file release-notes.md)
          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease --latest=false)
          else
            RELEASE_ARGS+=(--latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} 已存在，更新说明并覆盖同名资产"
            gh release edit "$TAG" "${RELEASE_ARGS[@]}"
            gh release upload "$TAG" \
              "release-assets/sub-web-${TAG}-dist.tar.gz#sub-web ${TAG} dist" \
              "release-assets/checksums.txt#SHA256 checksums" \
              --clobber
          else
            gh release create "$TAG" \
              "release-assets/sub-web-${TAG}-dist.tar.gz#sub-web ${TAG} dist" \
              "release-assets/checksums.txt#SHA256 checksums" \
              "${RELEASE_ARGS[@]}"
          fi

  notify:
    name: Telegram Release Notification
    env:
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      RELEASE_TAG: ${{ needs.build-and-push.outputs.tag || inputs.tag || github.ref_name }}
      SOURCE_SHA: ${{ needs.build-and-push.outputs.commit-sha }}
      GHCR_IMAGE: ${{ needs.build-and-push.outputs.ghcr-image }}
    if: ${{ always() }}
    needs: build-and-push
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Telegram 通知
        if: ${{ env.TELEGRAM_TO != '' && env.TELEGRAM_TOKEN != '' }}
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ env.TELEGRAM_TO }}
          token: ${{ env.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *sub-web 发布报告*

            *工作流*: `${{ github.workflow }}`
            *状态*: `${{ needs.build-and-push.result == 'failure' && '❌ 发布失败' || needs.build-and-push.result == 'cancelled' && '⚪ 发布取消' || needs.build-and-push.result == 'success' && '🚀 发布成功' || '⚠️ 发布未完成' }}`
            *发布任务*: `${{ needs.build-and-push.result }}`
            *标签*: `${{ env.RELEASE_TAG }}`
            *类型*: `${{ needs.build-and-push.outputs.prerelease == 'true' && 'Release Candidate / Prerelease' || needs.build-and-push.outputs.prerelease == 'false' && 'Stable' || 'Unknown' }}`
            *latest*: `${{ needs.build-and-push.outputs.prerelease == 'true' && '不更新' || needs.build-and-push.outputs.prerelease == 'false' && '更新' || '未知' }}`
            *Docker Hub*: `${{ env.DOCKER_IMAGE != '' && format('{0}:{1}', env.DOCKER_IMAGE, env.RELEASE_TAG) || '未配置' }}`
            *GHCR*: `${{ env.GHCR_IMAGE != '' && format('{0}:{1}', env.GHCR_IMAGE, env.RELEASE_TAG) || '未解析' }}`
            *提交*: ${{ env.SOURCE_SHA != '' && format('[{0}]({1}/{2}/commit/{0})', env.SOURCE_SHA, github.server_url, github.repository) || '`未解析`' }}
            *触发事件*: `${{ github.event_name }}`
            *工作流运行*: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            *触发人*: `${{ github.actor }}`
      - name: 记录 Telegram 通知跳过原因
        if: ${{ env.TELEGRAM_TO == '' || env.TELEGRAM_TOKEN == '' }}
        run: |
          {
            echo "### Telegram 通知已跳过"
            echo
            echo "未配置 TELEGRAM_TO 或 TELEGRAM_TOKEN。"
          } >> "$GITHUB_STEP_SUMMARY"
