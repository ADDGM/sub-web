name: Release Docker Image and GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.3 or v0.1.3-rc.1'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

jobs:
  build-and-push:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Resolve release tag
      id: release
      run: |
        if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
          TAG="${{ inputs.tag }}"
        else
          TAG="${GITHUB_REF_NAME}"
        fi

        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
          echo "发布标签必须使用 vX.Y.Z 或 vX.Y.Z-rc.N，例如：v0.1.3 或 v0.1.3-rc.1"
          exit 1
        fi

        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        if [[ "$TAG" == *-rc.* ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Check out repository
      uses: actions/checkout@v7
      with:
        ref: ${{ steps.release.outputs.tag }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Validate Docker image setting
      run: |
        test -n "$DOCKER_IMAGE" || {
          echo "请设置仓库变量 DOCKER_IMAGE，例如：yourname/subweb"
          exit 1
        }

    - name: Generate Docker image metadata
      id: docker-meta
      run: |
        TAG="${{ steps.release.outputs.tag }}"
        GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
        echo "ghcr-image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"

        if [[ "${{ steps.release.outputs.prerelease }}" != "true" ]]; then
          {
            echo "tags<<EOF"
            echo "${DOCKER_IMAGE}:${TAG}"
            echo "${DOCKER_IMAGE}:latest"
            echo "${GHCR_IMAGE}:${TAG}"
            echo "${GHCR_IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        else
          {
            echo "tags<<EOF"
            echo "${DOCKER_IMAGE}:${TAG}"
            echo "${GHCR_IMAGE}:${TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.docker-meta.outputs.tags }}

    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: "yarn"

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Build release assets
      run: |
        TAG="${{ steps.release.outputs.tag }}"
        yarn build
        mkdir -p release-assets
        tar -czf "release-assets/sub-web-${TAG}-dist.tar.gz" -C dist .
        sha256sum "release-assets/sub-web-${TAG}-dist.tar.gz" > release-assets/checksums.txt

    - name: Generate release notes
      run: |
        TAG="${{ steps.release.outputs.tag }}"
        GHCR_IMAGE="${{ steps.docker-meta.outputs.ghcr-image }}"

        {
          echo "# sub-web ${TAG}"
          echo
          echo "## Docker 镜像"
          echo
          echo "- Docker Hub: \`${DOCKER_IMAGE}:${TAG}\`"
          echo "- GHCR: \`${GHCR_IMAGE}:${TAG}\`"
          if [[ "${{ steps.release.outputs.prerelease }}" != "true" ]]; then
            echo "- Docker Hub latest: \`${DOCKER_IMAGE}:latest\`"
            echo "- GHCR latest: \`${GHCR_IMAGE}:latest\`"
          fi
          echo
          echo "## 构建产物"
          echo
          echo "- \`sub-web-${TAG}-dist.tar.gz\`: Vite 构建后的静态资源"
          echo "- \`checksums.txt\`: 构建产物 SHA256 校验值"
          echo
          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            echo "此版本为候选版本，不会更新 Docker \`latest\` 标签。"
          else
            echo "此版本为正式版本，已更新 Docker \`latest\` 标签。"
          fi
        } > release-notes.md

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.release.outputs.tag }}"

        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "GitHub Release ${TAG} 已存在"
          exit 1
        fi

        RELEASE_ARGS=(--verify-tag --title "sub-web ${TAG}" --notes-file release-notes.md)
        if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
          RELEASE_ARGS+=(--prerelease --latest=false)
        else
          RELEASE_ARGS+=(--latest)
        fi

        gh release create "$TAG" \
          "release-assets/sub-web-${TAG}-dist.tar.gz#sub-web ${TAG} dist" \
          "release-assets/checksums.txt#SHA256 checksums" \
          "${RELEASE_ARGS[@]}"

    # ==================== TG 通知 ====================
    - name: Telegram 通知
      if: always() # 确保无论成功还是失败都会发送通知
      continue-on-error: true
      uses: appleboy/telegram-action@v1.0.1
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          *GitHub Actions Docker 发布报告*

          *工作流*: `${{ github.workflow }}`
          *状态*: ${{ job.status == 'success' && '🚀 Docker 镜像与 GitHub Release 发布成功' || '❌ 发布流程失败' }}
          *Docker Hub*: `${{ env.DOCKER_IMAGE }}:${{ steps.release.outputs.tag }}`
          *GHCR*: `${{ steps.docker-meta.outputs.ghcr-image }}:${{ steps.release.outputs.tag }}`
          *标签*: `${{ steps.release.outputs.tag }}`
          *触发人*: ${{ github.actor }}
