name: Build and Push Multi-Arch Docker Image

on:
  push:
    tags:
      - 'fork-v*'
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

jobs:
  build-and-push:
    if: startsWith(github.ref, 'refs/tags/fork-v')
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Validate Docker image setting
      run: |
        test -n "$DOCKER_IMAGE" || {
          echo "请设置仓库变量 DOCKER_IMAGE，例如：yourname/subweb"
          exit 1
        }

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
          ${{ env.DOCKER_IMAGE }}:latest

    # ==================== TG 通知 ====================
    - name: Telegram 通知
      if: always() # 确保无论成功还是失败都会发送通知
      uses: appleboy/telegram-action@v1.0.1
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          *GitHub Actions Docker 发布报告*

          *工作流*: `${{ github.workflow }}`
          *状态*: ${{ job.status == 'success' && '🚀 Docker 镜像发布成功' || '❌ Docker 镜像构建失败' }}
          *镜像*: `${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}`
          *标签*: `${{ github.ref_name }}`
          *触发人*: ${{ github.actor }}
